<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>
  <!-- Background — no top stripe, pure gradient fill -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Chunky geometric M: square caps + miter joins for blocky tech feel -->
  <polyline
    points="5,25 5,7 16,17 27,7 27,25"
    stroke="white"
    stroke-width="5"
    fill="none"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />
  <!-- Dashboard indicator dot — unique detail, not in Gmail icon -->
  <circle cx="16" cy="27.5" r="1.8" fill="rgba(255,255,255,0.5)"/>
</svg>
