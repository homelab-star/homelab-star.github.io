<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="r"><rect width="32" height="32" rx="7"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1c2b4e"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Indigo top accent stripe -->
  <rect width="32" height="4" fill="url(#bar)" clip-path="url(#r)"/>
  <!-- Subtle inner glow on top -->
  <rect y="4" width="32" height="6" fill="url(#bar)" opacity="0.08" clip-path="url(#r)"/>
  <!-- Letter M — stroke-based for crisp rendering -->
  <polyline
    points="5.5,26 5.5,9 16,20.5 26.5,9 26.5,26"
    stroke="white"
    stroke-width="3.2"
    stroke-linejoin="miter"
    stroke-linecap="round"
    fill="none"
    opacity="0.95"
  />
</svg>
